<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Orbit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0/lib/addon-webgl.min.js"></script>
<style>
/* ======================================================================
   Reset & Custom Properties
   ====================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Surfaces — near-black, tight contrast */
  --bg:          #09090b;
  --bg-raised:   #0f0f12;
  --bg-surface:  #151518;
  --bg-hover:    #1a1a1f;
  --bg-active:   #222228;

  /* Borders — subtle */
  --border:      rgba(255, 255, 255, 0.06);
  --border-hover:rgba(255, 255, 255, 0.12);

  /* Text */
  --text:        #e4e4e7;
  --text-secondary: #a1a1aa;
  --text-tertiary:  #52525b;

  /* Accent — orange */
  --accent:      #F97316;
  --accent-soft:  rgba(249, 115, 22, 0.12);
  --accent-hover: #FB923C;

  /* Semantic */
  --green:       #34D399;
  --green-soft:  rgba(52, 211, 153, 0.10);
  --yellow:      #FBBF24;
  --yellow-soft: rgba(251, 191, 36, 0.10);
  --red:         #F87171;
  --red-soft:    rgba(248, 113, 113, 0.10);
  --orange:      #FB923C;
  --orange-soft: rgba(251, 146, 60, 0.10);

  /* Typography */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;

  /* Spacing — compact */
  --space-xs:  3px;
  --space-sm:  6px;
  --space-md:  12px;
  --space-lg:  18px;
  --space-xl:  24px;
  --space-2xl: 36px;

  /* Radii — tighter */
  --radius-sm: 4px;
  --radius:    6px;
  --radius-lg: 8px;
  --radius-xl: 12px;

  /* Shadows — minimal, dark */
  --shadow-sm:  0 1px 2px rgba(0,0,0,0.4);
  --shadow:     0 1px 4px rgba(0,0,0,0.5);
  --shadow-lg:  0 4px 16px rgba(0,0,0,0.5);
  --shadow-xl:  0 8px 32px rgba(0,0,0,0.6);

  /* Transitions */
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ======================================================================
   Layout — Sidebar + Main
   ====================================================================== */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* --- Sidebar --- */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: var(--bg-raised);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.sidebar-header {
  padding: var(--space-lg) var(--space-md) var(--space-md);
}

.sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}

.sidebar-logo-icon svg {
  width: 15px;
  height: 15px;
  color: #fff;
}

.sidebar-logo h1 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}

.sidebar-logo .version {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-tertiary);
  margin-top: 0;
}

.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-xs) var(--space-sm);
}

.nav-group {
  margin-bottom: var(--space-md);
}

.nav-group-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-tertiary);
  padding: var(--space-xs) var(--space-sm);
  margin-bottom: 2px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px var(--space-sm);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.15s var(--ease);
  user-select: none;
  position: relative;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.nav-item.active {
  background: var(--accent-soft);
  color: var(--accent);
}

.nav-item .nav-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  opacity: 0.7;
}

.nav-item.active .nav-icon {
  opacity: 1;
}

.nav-item .nav-badge {
  margin-left: auto;
  background: var(--bg-active);
  color: var(--text-tertiary);
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 100px;
  min-width: 20px;
  text-align: center;
}

.nav-item.active .nav-badge {
  background: var(--accent-soft);
  color: var(--accent);
}

/* --- Main --- */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.main-header {
  padding: var(--space-md) var(--space-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 48px;
  border-bottom: 1px solid var(--border);
}

.main-header h2 {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.main-header .subtitle {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 1px;
}

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: var(--space-lg);
}

/* ======================================================================
   Loading Bar
   ====================================================================== */
.loading-bar {
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  animation: loading-slide 1.2s ease-in-out infinite;
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
}

@keyframes loading-slide {
  0%   { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ======================================================================
   Buttons
   ====================================================================== */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  color: var(--text-secondary);
  transition: all 0.15s var(--ease);
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-hover);
  border-color: var(--border-hover);
  color: var(--text);
}

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.btn-primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
}

.btn-danger {
  color: var(--red);
}

.btn-danger:hover {
  background: var(--red-soft);
  border-color: rgba(248,113,113,0.2);
  color: var(--red);
}

.btn-sm {
  padding: 3px 8px;
  font-size: 11px;
}

.btn-icon {
  padding: 4px 6px;
}

.btn svg {
  width: 12px;
  height: 12px;
}

.btn-group {
  display: flex;
  gap: var(--space-xs);
}

/* ======================================================================
   Cards
   ====================================================================== */
.card {
  background: var(--bg-raised);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  overflow: hidden;
}

.card-header {
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.card-header h3 {
  font-size: 12px;
  font-weight: 600;
}

.card-body {
  padding: var(--space-md);
}

/* ======================================================================
   Summary Cards (Dashboard feel)
   ====================================================================== */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.summary-card {
  background: var(--bg-raised);
  border-radius: var(--radius);
  padding: var(--space-md);
  border: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
  transition: all 0.15s var(--ease);
  cursor: pointer;
}

.summary-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-surface);
}

.summary-card-icon {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
}

.summary-card-icon svg {
  width: 14px;
  height: 14px;
}

.summary-card-icon.blue   { background: var(--accent-soft); color: var(--accent); }
.summary-card-icon.green  { background: var(--green-soft); color: var(--green); }
.summary-card-icon.yellow { background: var(--yellow-soft); color: var(--yellow); }
.summary-card-icon.red    { background: var(--red-soft); color: var(--red); }

.summary-card-value {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
  line-height: 1;
}

.summary-card-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-tertiary);
}

/* ======================================================================
   Tables
   ====================================================================== */
.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th {
  text-align: left;
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--text-tertiary);
  padding: 8px var(--space-md);
  border-bottom: 1px solid var(--border);
}

td {
  padding: 8px var(--space-md);
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

tr:last-child td { border-bottom: none; }

tr.clickable {
  cursor: pointer;
  transition: background 0.1s var(--ease);
}

tr.clickable:hover td {
  background: var(--bg-hover);
}

/* ======================================================================
   Status Badges
   ====================================================================== */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 100px;
}

.status-badge .dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

.status-healthy, .status-pass, .status-idle {
  background: var(--green-soft);
  color: var(--green);
}
.status-healthy .dot, .status-pass .dot, .status-idle .dot {
  background: var(--green);
}

.status-busy {
  background: var(--yellow-soft);
  color: var(--yellow);
}
.status-busy .dot {
  background: var(--yellow);
  animation: pulse 1.5s ease-in-out infinite;
}

.status-fail, .status-error {
  background: var(--red-soft);
  color: var(--red);
}
.status-fail .dot, .status-error .dot {
  background: var(--red);
}

.status-warn, .status-retry {
  background: var(--orange-soft);
  color: var(--orange);
}
.status-warn .dot, .status-retry .dot {
  background: var(--orange);
}

.status-unknown {
  background: var(--bg-active);
  color: var(--text-tertiary);
}
.status-unknown .dot {
  background: var(--text-tertiary);
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ======================================================================
   Server Cards
   ====================================================================== */
.server-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: var(--space-sm);
}

.server-card {
  background: var(--bg-raised);
  border-radius: var(--radius);
  padding: var(--space-md);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s var(--ease);
  border-left: 3px solid transparent;
  position: relative;
}

.server-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-surface);
}

.server-card.healthy {
  border-left-color: var(--green);
}

.server-card.unhealthy {
  border-left-color: var(--red);
}

.server-card-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-sm);
}

.server-card-top strong {
  font-size: 13px;
  font-weight: 600;
}

.server-card-dir {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  margin-bottom: var(--space-sm);
}

.server-card-meta {
  display: flex;
  gap: var(--space-md);
  font-size: 11px;
  color: var(--text-tertiary);
}

.server-card-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

/* ======================================================================
   Detail Header (back navigation)
   ====================================================================== */
.detail-header {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-lg);
}

.back-btn {
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text-secondary);
  transition: all 0.15s var(--ease);
  flex-shrink: 0;
}

.back-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.back-btn svg {
  width: 16px;
  height: 16px;
}

.detail-info { flex: 1; }
.detail-info h2 {
  font-size: 15px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.detail-info .meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 1px;
}

/* ======================================================================
   Conversation / Messages
   ====================================================================== */
.conversation {
  display: flex;
  flex-direction: column;
  gap: var(--space-sm);
  max-width: 860px;
}

.message {
  display: flex;
  gap: var(--space-sm);
  padding: var(--space-md);
  border-radius: var(--radius);
}

.message-user {
  background: var(--bg-surface);
}

.message-assistant {
  background: var(--bg-raised);
}

.message-avatar {
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
}

.message-user .message-avatar {
  background: var(--accent-soft);
  color: var(--accent);
}

.message-assistant .message-avatar {
  background: var(--accent-soft);
  color: var(--accent);
}

.message-body {
  flex: 1;
  min-width: 0;
}

.message-role {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.6px;
  margin-bottom: 6px;
}

.message-text {
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--text);
}

.message-text code {
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12.5px;
}

.message-text pre {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: var(--space-md);
  overflow-x: auto;
  margin: var(--space-sm) 0;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
}

.message-meta {
  display: flex;
  gap: var(--space-md);
  margin-top: 10px;
  font-size: 11px;
  color: var(--text-tertiary);
}

.tool-call {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px var(--space-md);
  margin: 6px 0;
  font-size: 12px;
}

.tool-call-name {
  font-family: var(--font-mono);
  color: var(--accent);
  font-weight: 600;
  font-size: 12px;
}

/* ======================================================================
   Doctor Check Cards
   ====================================================================== */
.doctor-summary {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-md);
  background: var(--bg-raised);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: var(--space-md);
}

.doctor-summary-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.doctor-summary-icon.pass { background: var(--green-soft); color: var(--green); }
.doctor-summary-icon.fail { background: var(--red-soft); color: var(--red); }

.doctor-summary-icon svg {
  width: 16px;
  height: 16px;
}

.doctor-summary-text h3 {
  font-size: 13px;
  font-weight: 600;
}

.doctor-summary-text p {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 1px;
}

.check-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-xs);
}

.check-item {
  background: var(--bg-raised);
  border-radius: var(--radius-sm);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  align-items: flex-start;
  gap: var(--space-sm);
  border: 1px solid var(--border);
}

.check-icon {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}

.check-icon svg {
  width: 10px;
  height: 10px;
}

.check-icon.pass { background: var(--green-soft); color: var(--green); }
.check-icon.warn { background: var(--yellow-soft); color: var(--yellow); }
.check-icon.fail { background: var(--red-soft); color: var(--red); }

.check-content { flex: 1; }

.check-content .check-name {
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font-mono);
}

.check-content .check-message {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 1px;
}

.check-content .check-fix {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--text-tertiary);
  margin-top: 3px;
  padding: 4px 8px;
  background: var(--bg);
  border-radius: 3px;
  display: inline-block;
}

/* ======================================================================
   Empty States
   ====================================================================== */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px var(--space-lg);
  color: var(--text-tertiary);
  text-align: center;
}

.empty-state-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius);
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: var(--space-md);
}

.empty-state-icon svg {
  width: 20px;
  height: 20px;
  opacity: 0.5;
}

.empty-state h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
}

.empty-state p {
  font-size: 13px;
  max-width: 320px;
  line-height: 1.5;
}

/* ======================================================================
   Modal
   ====================================================================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.65);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  animation: fadeIn 0.15s var(--ease);
}

.modal {
  background: var(--bg-raised);
  border-radius: var(--radius-lg);
  width: 420px;
  max-width: 90vw;
  border: 1px solid var(--border);
  box-shadow: var(--shadow-xl);
  animation: modalIn 0.2s var(--ease);
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.95) translateY(8px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-header {
  padding: var(--space-md);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 {
  font-size: 14px;
  font-weight: 600;
}

.modal-body {
  padding: var(--space-md);
}

.modal-footer {
  padding: var(--space-sm) var(--space-md);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: var(--space-xs);
}

.form-group {
  margin-bottom: var(--space-sm);
}

.form-group:last-child {
  margin-bottom: 0;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 13px;
  font-family: var(--font);
  transition: border-color 0.15s var(--ease);
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: var(--text-tertiary);
}

.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}

/* ======================================================================
   Spinner
   ====================================================================== */
.spinner {
  display: inline-block;
  width: 16px;
  height: 16px;
  border: 2px solid var(--bg-active);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ======================================================================
   Scrollbar
   ====================================================================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--bg-active);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

/* ======================================================================
   Utility
   ====================================================================== */
.mono {
  font-family: var(--font-mono);
  font-size: 12px;
}

.text-muted { color: var(--text-secondary); }
.text-dim   { color: var(--text-tertiary); }
.text-sm    { font-size: 12px; }

.mt-sm { margin-top: var(--space-sm); }
.mt-md { margin-top: var(--space-md); }
.mt-lg { margin-top: var(--space-lg); }

/* ======================================================================
   Terminal Container — xterm.js PTY bridge
   ====================================================================== */
.terminal-container {
  position: relative;
  width: 100%;
  height: calc(100vh - 100px);
  background: #000;
  border-radius: var(--radius);
  overflow: hidden;
}

.terminal-loading {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-md);
  background: var(--bg);
  z-index: 10;
}

.terminal-loading-spinner {
  width: 24px;
  height: 24px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: terminal-spin 0.8s linear infinite;
}

@keyframes terminal-spin {
  to { transform: rotate(360deg); }
}

.terminal-loading-text {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

.terminal-loading-sub {
  font-size: 11px;
  color: var(--text-tertiary);
}

.terminal-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: var(--space-md);
  z-index: 20;
  backdrop-filter: blur(4px);
}

.terminal-overlay-msg {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
}

/* ======================================================================
   Code Block Copy Buttons
   ====================================================================== */
.code-block-wrapper {
  position: relative;
}

.code-block-wrapper pre {
  margin: 0;
}

.code-copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 4px 8px;
  font-size: 11px;
  font-weight: 500;
  font-family: var(--font);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-tertiary);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s var(--ease), background 0.15s var(--ease);
  display: flex;
  align-items: center;
  gap: 4px;
}

.code-block-wrapper:hover .code-copy-btn {
  opacity: 1;
}

.code-copy-btn:hover {
  background: var(--bg-hover);
  color: var(--text);
}

.code-copy-btn svg {
  width: 12px;
  height: 12px;
}

.code-lang {
  position: absolute;
  top: 8px;
  left: 12px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-tertiary);
  opacity: 0.6;
}
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
        </div>
        <div>
          <h1>Orbit</h1>
          <div class="version">AI Environment Manager</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-group">
        <div class="nav-group-label">Overview</div>
        <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" data-page="servers" onclick="navigate('servers')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>
          <span>Servers</span>
          <span class="nav-badge" id="server-count">-</span>
        </div>
        <div class="nav-item" data-page="sessions" onclick="navigate('sessions')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Sessions</span>
          <span class="nav-badge" id="session-count">-</span>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">AI</div>
        <div class="nav-item" data-page="chat" onclick="navigate('chat')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          <span>Chat</span>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">Manage</div>
        <div class="nav-item" data-page="environments" onclick="navigate('environments')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>Environments</span>
          <span class="nav-badge" id="env-count">-</span>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-group-label">System</div>
        <div class="nav-item" data-page="doctor" onclick="navigate('doctor')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          <span>Doctor</span>
        </div>
      </div>
    </nav>
  </div>

  <!-- Main -->
  <div class="main">
    <div id="loading-bar" class="loading-bar" style="display:none"></div>
    <div class="main-header">
      <div>
        <h2 id="page-title">Dashboard</h2>
        <div class="subtitle" id="page-subtitle"></div>
      </div>
      <div id="header-actions"></div>
    </div>
    <div class="main-content" id="page-content"></div>
  </div>
</div>

<!-- Modal container -->
<div id="modal-root"></div>

<script>
/* ========================================================================
   SVG Icon Library
   ======================================================================== */
const icons = {
  refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>',
  plus: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  arrowLeft: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>',
  check: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  server: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1"/><circle cx="6" cy="18" r="1"/></svg>',
  message: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
  folder: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
  activity: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
  close: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>',
  terminal: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
};

/* ========================================================================
   State
   ======================================================================== */
const state = {
  page: 'dashboard',
  servers: [],
  sessions: [],
  environments: [],
  doctor: null,
  selectedSession: null,
  selectedServer: null,
  tuiOpts: null,           // { serverURL, sessionID?, title? } — for OpenCodeTUI
  loading: false,
};

/* ========================================================================
   API
   ======================================================================== */
async function api(path, opts = {}) {
  const resp = await fetch(path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ error: resp.statusText }));
    throw new Error(err.error || resp.statusText);
  }
  return resp.json();
}

async function proxyGet(port, path) {
  return api(`/api/proxy/${port}${path}`);
}

/* ========================================================================
   Data Fetching
   ======================================================================== */
async function fetchServers() {
  try {
    state.servers = await api('/api/servers');
    if (!state.servers) state.servers = [];
  } catch (e) {
    state.servers = [];
    console.error('fetch servers:', e);
  }
  updateBadge('server-count', state.servers.length);
}

async function fetchSessions() {
  try {
    state.sessions = await api('/api/sessions');
    if (!state.sessions) state.sessions = [];
  } catch (e) {
    state.sessions = [];
    console.error('fetch sessions:', e);
  }
  updateBadge('session-count', state.sessions.length);
}

async function fetchEnvironments() {
  try {
    state.environments = await api('/api/environments');
    if (!state.environments) state.environments = [];
  } catch (e) {
    state.environments = [];
    console.error('fetch environments:', e);
  }
  updateBadge('env-count', state.environments.length);
}

async function fetchDoctor() {
  try {
    state.doctor = await api('/api/doctor');
  } catch (e) {
    state.doctor = null;
    console.error('fetch doctor:', e);
  }
}

async function fetchSessionStatus(port) {
  try {
    return await proxyGet(port, '/session/status');
  } catch (e) {
    return {};
  }
}

function updateBadge(id, count) {
  const el = document.getElementById(id);
  if (el) el.textContent = count;
}

/* ========================================================================
   Navigation
   ======================================================================== */
function navigate(page, opts = {}) {
  // Destroy terminal when leaving a TUI page
  const tuiPages = ['chat', 'tui'];
  if (tuiPages.includes(state.page) && !tuiPages.includes(page)) {
    OpenCodeTUI.destroy();
  }

  state.page = page;
  state.selectedSession = opts.session || null;
  state.selectedServer = opts.server || null;
  state.tuiOpts = opts.tuiOpts || null;

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });

  render();
}

/* ========================================================================
   Render Router
   ======================================================================== */
function render() {
  const content = document.getElementById('page-content');
  const title = document.getElementById('page-title');
  const subtitle = document.getElementById('page-subtitle');
  const actions = document.getElementById('header-actions');
  actions.innerHTML = '';
  subtitle.textContent = '';

  switch (state.page) {
    case 'dashboard':
      title.textContent = 'Dashboard';
      subtitle.textContent = 'Overview of your AI environments';
      actions.innerHTML = `<button class="btn btn-sm" onclick="refreshAll()">${icons.refresh} Refresh</button>`;
      renderDashboard(content);
      break;
    case 'servers':
      title.textContent = 'Servers';
      subtitle.textContent = state.servers.length + ' discovered';
      actions.innerHTML = `<button class="btn btn-sm" onclick="refreshAll()">${icons.refresh} Refresh</button>`;
      renderServers(content);
      break;
    case 'sessions':
      title.textContent = 'Sessions';
      subtitle.textContent = state.sessions.length + ' total';
      actions.innerHTML = `<button class="btn btn-sm" onclick="refreshAll()">${icons.refresh} Refresh</button>`;
      renderSessions(content);
      break;
    case 'tui':
      title.textContent = state.tuiOpts?.title || 'Session';
      subtitle.textContent = state.tuiOpts?.sessionID ? state.tuiOpts.sessionID.substring(0, 12) : '';
      actions.innerHTML = `<button class="btn btn-sm" onclick="OpenCodeTUI.reconnect()">${icons.refresh} Reconnect</button>`;
      renderTUI(content);
      break;
    case 'server-detail':
      title.textContent = 'Server';
      renderServerDetail(content);
      break;
    case 'environments':
      title.textContent = 'Environments';
      subtitle.textContent = state.environments.length + ' registered';
      actions.innerHTML = `<button class="btn btn-primary btn-sm" onclick="showAddEnvModal()">${icons.plus} Add Environment</button>`;
      renderEnvironments(content);
      break;
    case 'doctor':
      title.textContent = 'Doctor';
      subtitle.textContent = 'System diagnostics';
      actions.innerHTML = `<button class="btn btn-sm" onclick="runDoctor()">${icons.activity} Run Checks</button>`;
      renderDoctor(content);
      break;
    case 'chat':
      title.textContent = 'Chat';
      subtitle.textContent = 'New AI Session';
      actions.innerHTML = `<button class="btn btn-sm" onclick="OpenCodeTUI.reconnect()">${icons.refresh} Reconnect</button>`;
      renderChat(content);
      break;
  }
}

/* ========================================================================
   Page: Dashboard
   ======================================================================== */
function renderDashboard(el) {
  const healthyCount = state.servers.filter(s => s.healthy).length;
  const busyCount = state.sessions.filter(s => s.status === 'busy').length;

  el.innerHTML = `
    <div class="summary-grid">
      <div class="summary-card" onclick="navigate('servers')">
        <div class="summary-card-icon blue">${icons.server}</div>
        <div class="summary-card-value">${state.servers.length}</div>
        <div class="summary-card-label">${state.servers.length === 1 ? 'Server' : 'Servers'} discovered${healthyCount > 0 ? ` &middot; ${healthyCount} healthy` : ''}</div>
      </div>
      <div class="summary-card" onclick="navigate('sessions')">
        <div class="summary-card-icon green">${icons.message}</div>
        <div class="summary-card-value">${state.sessions.length}</div>
        <div class="summary-card-label">${state.sessions.length === 1 ? 'Session' : 'Sessions'}${busyCount > 0 ? ` &middot; ${busyCount} active` : ''}</div>
      </div>
      <div class="summary-card" onclick="navigate('environments')">
        <div class="summary-card-icon yellow">${icons.folder}</div>
        <div class="summary-card-value">${state.environments.length}</div>
        <div class="summary-card-label">${state.environments.length === 1 ? 'Environment' : 'Environments'} registered</div>
      </div>
      <div class="summary-card" onclick="navigate('doctor')">
        <div class="summary-card-icon ${state.doctor && !state.doctor.ok ? 'red' : 'blue'}">${icons.activity}</div>
        <div class="summary-card-value">${state.doctor ? (state.doctor.ok ? 'OK' : '!') : '--'}</div>
        <div class="summary-card-label">System health</div>
      </div>
    </div>

    ${state.servers.length > 0 ? `
      <h3 style="font-size:14px;font-weight:600;margin-bottom:var(--space-md);color:var(--text-secondary)">Active Servers</h3>
      <div class="server-grid" style="margin-bottom:var(--space-xl)">
        ${state.servers.slice(0, 4).map(s => renderServerCardHTML(s)).join('')}
      </div>
    ` : ''}

    ${state.sessions.length > 0 ? `
      <h3 style="font-size:14px;font-weight:600;margin-bottom:var(--space-md);color:var(--text-secondary)">Recent Sessions</h3>
      <div class="card">
        <div class="table-wrap"><table>
          <thead><tr><th>Title</th><th>Environment</th><th>Status</th><th>Created</th></tr></thead>
          <tbody>${state.sessions.slice(0, 5).map(s => `
            <tr class="clickable" onclick="openSessionTUI(${s.server_port}, '${esc(s.id)}', '${esc(s.title || 'Untitled')}')">
              <td><strong>${esc(s.title || 'Untitled')}</strong><br><span class="mono text-dim">${esc((s.id || '').substring(0, 8))}</span></td>
              <td>${s.environment_name ? esc(s.environment_name) : '<span class="text-dim">--</span>'}</td>
              <td>${statusBadge(s.status || 'unknown')}</td>
              <td class="text-sm text-dim">${formatTime(s.created_at)}</td>
            </tr>
          `).join('')}</tbody>
        </table></div>
      </div>
    ` : ''}
  `;
}

/* ========================================================================
   Page: Servers
   ======================================================================== */
function renderServerCardHTML(s) {
  return `
    <div class="server-card ${s.healthy ? 'healthy' : 'unhealthy'}" onclick="openServerDetail(${s.port})">
      <div class="server-card-top">
        <strong>PID ${s.pid}</strong>
        ${statusBadge(s.healthy ? 'healthy' : 'unknown')}
      </div>
      <div class="server-card-dir" title="${esc(s.directory)}">${esc(s.directory || 'unknown')}</div>
      <div class="server-card-meta">
        <span>Port ${s.port}</span>
        <span>${esc(s.hostname || '127.0.0.1')}</span>
        ${s.version ? `<span>v${esc(s.version)}</span>` : ''}
      </div>
    </div>`;
}

function renderServers(el) {
  if (state.servers.length === 0) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">${icons.server}</div>
        <h3>No servers discovered</h3>
        <p>Start an OpenCode server and it will appear here automatically.</p>
      </div>`;
    return;
  }

  el.innerHTML = `<div class="server-grid">${state.servers.map(s => renderServerCardHTML(s)).join('')}</div>`;
}

async function openServerDetail(port) {
  const server = state.servers.find(s => s.port === port);
  if (!server) return;
  navigate('server-detail', { server });
}

/* ========================================================================
   Page: Server Detail
   ======================================================================== */
async function renderServerDetail(el) {
  const s = state.selectedServer;
  if (!s) { navigate('servers'); return; }

  el.innerHTML = `
    <div class="detail-header">
      <span class="back-btn" onclick="navigate('servers')">${icons.arrowLeft}</span>
      <div class="detail-info">
        <h2>Server on port ${s.port}</h2>
        <div class="meta">${esc(s.directory || 'unknown')} &middot; PID ${s.pid}</div>
      </div>
      ${statusBadge(s.healthy ? 'healthy' : 'unknown')}
    </div>
    <div id="server-sessions-area">
      <div style="padding:var(--space-xl);color:var(--text-tertiary)"><span class="spinner"></span> Loading sessions...</div>
    </div>`;

  try {
    const [sessions, statuses] = await Promise.all([
      proxyGet(s.port, '/session'),
      fetchSessionStatus(s.port),
    ]);
    const topLevel = (sessions || []).filter(s => !s.parentID);
    renderServerSessions(document.getElementById('server-sessions-area'), topLevel, statuses || {}, s.port);
  } catch (e) {
    document.getElementById('server-sessions-area').innerHTML =
      `<div class="empty-state"><p>Could not load sessions: ${esc(e.message)}</p></div>`;
  }
}

function renderServerSessions(el, sessions, statuses, port) {
  if (sessions.length === 0) {

      <div class="table-wrap"><table>
        <thead><tr><th>Title</th><th>Status</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody>${sessions.map(s => {
          const st = statuses[s.id] || { type: 'unknown' };
          return `<tr class="clickable" onclick="openSessionTUI(${port}, '${esc(s.id)}', '${esc(s.title || 'Untitled')}')">
            <td><strong>${esc(s.title || 'Untitled')}</strong><br><span class="mono text-dim">${esc(s.id.substring(0, 8))}</span></td>
            <td>${statusBadge(st.type)}</td>

}

  el.innerHTML = `
    <div class="doctor-summary">
      <div class="doctor-summary-icon ${d.ok ? 'pass' : 'fail'}">
        ${d.ok ? icons.check : icons.alert}
      </div>
      <div class="doctor-summary-text">
        <h3>${d.ok ? 'All checks passed' : 'Some checks need attention'}</h3>
        <p>${passCount} of ${totalCount} checks passed</p>
      </div>
    </div>
    <div class="check-list">
      ${(d.results || []).map(r => `
        <div class="check-item">
          <div class="check-icon ${r.status}">
            ${r.status === 'pass' ? icons.check : r.status === 'warn' ? icons.alert : icons.x}
          </div>
          <div class="check-content">
            <div class="check-name">${esc(r.name)}</div>
            <div class="check-message">${esc(r.message)}</div>

          </div>
        </div>
      `).join('')}
    </div>`;
}

/* ========================================================================
   Actions
   ======================================================================== */
async function refreshAll() {
  showLoading(true);
  await Promise.all([fetchServers(), fetchSessions(), fetchEnvironments()]);
  showLoading(false);
  render();
}

async function runDoctor() {
  showLoading(true);
  await fetchDoctor();
  showLoading(false);
  render();
}

async function abortSession(id) {
  if (!confirm('Abort this session?')) return;
  try {
    await api(`/api/sessions/${id}/abort`, { method: 'POST' });
    await fetchSessions();
    render();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteSession(id) {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  try {
    await api(`/api/sessions/${id}`, { method: 'DELETE' });
    await fetchSessions();
    render();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteSessionDirect(port, id) {
  if (!confirm('Delete this session? This cannot be undone.')) return;
  try {
    await proxyGet(port, `/session/${id}`);
    await fetch(`/api/proxy/${port}/session/${id}`, { method: 'DELETE' });
    if (state.selectedServer) {
      renderServerDetail(document.getElementById('page-content'));
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function deleteEnv(name) {
  if (!confirm(`Delete environment "${name}"? This only removes it from Orbit's registry.`)) return;
  try {
    await api(`/api/environments/${encodeURIComponent(name)}`, { method: 'DELETE' });
    await fetchEnvironments();
    render();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function submitAddEnv() {
  const name = document.getElementById('env-name').value.trim();
  const path = document.getElementById('env-path').value.trim();
  const desc = document.getElementById('env-desc').value.trim();

  if (!name || !path) {
    alert('Name and path are required');
    return;
  }

  try {
    await api('/api/environments', {
      method: 'POST',
      body: JSON.stringify({ name, path, description: desc }),
    });
    closeModal();
    await fetchEnvironments();
    render();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function closeModal(event) {
  if (event && event.target !== event.currentTarget) return;
  document.getElementById('modal-root').innerHTML = '';
}

/* ========================================================================
   Helpers
   ======================================================================== */
function esc(str) {
  if (str == null) return '';
  const d = document.createElement('div');
  d.textContent = String(str);
  return d.innerHTML;
}

function statusBadge(status) {
  const label = status || 'unknown';
  return `<span class="status-badge status-${label}"><span class="dot"></span>${label}</span>`;
}

function formatTime(t) {
  if (!t) return '--';
  let d;
  if (typeof t === 'number') {
    d = new Date(t > 1e12 ? t : t * 1000);
  } else {
    d = new Date(t);
  }
  if (isNaN(d.getTime())) return '--';

  const now = new Date();
  const diff = now - d;

  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return d.toLocaleDateString();
}

function showLoading(on) {
  document.getElementById('loading-bar').style.display = on ? 'block' : 'none';
}

/* ========================================================================
   OpenCodeTUI — Universal xterm.js + PTY bridge for OpenCode sessions
   ========================================================================
   Usage:
     OpenCodeTUI.open({ serverURL, sessionID?, title? })
       - serverURL: the OpenCode server URL (e.g. http://127.0.0.1:PORT)
       - sessionID: (optional) attach to existing session with --continue
       - title:     (optional) display title for the header
     OpenCodeTUI.destroy()   — teardown terminal + PTY
     OpenCodeTUI.reconnect() — destroy + re-open with same opts
     OpenCodeTUI.isActive()  — true if a terminal is currently running
   ======================================================================== */
const OpenCodeTUI = {
  // Internal state
  _terminalId: null,
  _ws: null,
  _term: null,
  _fitAddon: null,
  _webglAddon: null,
  _resizeObserver: null,
  _destroyed: false,
  _currentOpts: null,   // { serverURL, sessionID?, title? } — kept for reconnect

  /**
   * Open an OpenCode TUI terminal.
   * @param {Object} opts
   * @param {string} opts.serverURL  - OpenCode server URL
   * @param {string} [opts.sessionID] - Session to attach to (omit for new session)
   * @param {string} [opts.title]     - Display title
   */
  async open(opts = {}) {
    const self = OpenCodeTUI;
    self._destroyed = false;
    self._currentOpts = opts;

    const container = document.getElementById('terminal-xterm');
    const loadingEl = document.getElementById('terminal-loading');
    const loadingSub = document.getElementById('terminal-loading-sub');
    if (!container) return;

    // --- 1. Create xterm instance ---
    const term = new Terminal({
      cursorBlink: true,
      fontSize: 14,
      fontFamily: "'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'SF Mono', Consolas, monospace",
      theme: {
        background: '#0f1117',
        foreground: '#e8ecf4',
        cursor: '#4C8BF5',
        selectionBackground: 'rgba(76,139,245,0.3)',
        black: '#1c1f2b',
        red: '#F87171',
        green: '#34D399',
        yellow: '#FBBF24',
        blue: '#4C8BF5',
        magenta: '#a882ff',
        cyan: '#22D3EE',
        white: '#e8ecf4',
        brightBlack: '#5f6880',
        brightRed: '#FCA5A5',
        brightGreen: '#6EE7B7',
        brightYellow: '#FDE68A',
        brightBlue: '#93C5FD',
        brightMagenta: '#C4B5FD',
        brightCyan: '#67E8F9',
        brightWhite: '#F8FAFC',
      },
      allowProposedApi: true,
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    self._term = term;
    self._fitAddon = fitAddon;

    // Try WebGL renderer for performance
    try {
      const webglAddon = new WebglAddon.WebglAddon();
      term.loadAddon(webglAddon);
      self._webglAddon = webglAddon;
    } catch (e) {
      console.warn('WebGL addon failed, using canvas renderer:', e);
    }

    term.open(container);
    fitAddon.fit();

    // --- 2. Resolve server URL ---
    let serverURL = opts.serverURL;
    if (!serverURL) {
      // No explicit URL — discover from managed server endpoint
      if (loadingSub) loadingSub.textContent = 'Discovering OpenCode server...';
      try {
        const msResp = await fetch('/api/managed-server');
        if (!msResp.ok) {
          const msErr = await msResp.json().catch(() => ({ error: msResp.statusText }));
          throw new Error(msErr.error || 'No managed server available');
        }
        const msData = await msResp.json();
        serverURL = msData.url;
        // Store for reconnect
        self._currentOpts.serverURL = serverURL;
      } catch (e) {
        if (loadingSub) loadingSub.textContent = 'Failed: ' + e.message;
        return;
      }
    }

    // --- 3. Build opencode attach args ---
    const args = ['attach'];
    if (opts.sessionID) {
      args.push('--session', opts.sessionID, '--continue');
    }
    args.push(serverURL);

    // --- 4. Spawn PTY terminal via REST API ---
    if (loadingSub) {
      loadingSub.textContent = opts.sessionID
        ? 'Attaching to session...'
        : 'Starting new session...';
    }
    try {
      const cols = term.cols;
      const rows = term.rows;
      const resp = await fetch('/api/terminal', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ command: 'opencode', args, cols, rows }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ error: resp.statusText }));
        throw new Error(err.error || resp.statusText);
      }
      const data = await resp.json();
      self._terminalId = data.id;
    } catch (e) {
      if (loadingSub) loadingSub.textContent = 'Failed: ' + e.message;
      return;
    }

    // --- 5. Connect WebSocket for bidirectional I/O ---
    if (loadingSub) loadingSub.textContent = 'Connecting...';
    try {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = proto + '//' + location.host + '/api/terminal/' + self._terminalId + '/ws';
      const ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';
      self._ws = ws;

      ws.onopen = () => {
        if (loadingEl) loadingEl.style.display = 'none';
        container.style.display = 'block';
        fitAddon.fit();
        term.focus();
      };

      ws.onmessage = (evt) => {
        if (self._destroyed) return;
        if (evt.data instanceof ArrayBuffer) {
          term.write(new Uint8Array(evt.data));
        }
      };

      ws.onclose = () => {
        if (self._destroyed) return;
        self._showOverlay('Terminal session ended.');
      };

      ws.onerror = () => {
        if (self._destroyed) return;
        self._showOverlay('WebSocket connection error.');
      };
    } catch (e) {
      if (loadingSub) loadingSub.textContent = 'WebSocket failed: ' + e.message;
      return;
    }

    // --- 6. Wire terminal input -> WebSocket (binary) ---
    term.onData((data) => {
      if (self._ws && self._ws.readyState === WebSocket.OPEN) {
        self._ws.send(new TextEncoder().encode(data));
      }
    });

    // --- 7. Wire resize events ---
    term.onResize(({ cols, rows }) => {
      if (self._ws && self._ws.readyState === WebSocket.OPEN) {
        self._ws.send(JSON.stringify({ type: 'resize', cols, rows }));
      }
    });

    // --- 8. Auto-fit on container resize ---
    self._resizeObserver = new ResizeObserver(() => {
      if (!self._destroyed && self._fitAddon) {
        try { self._fitAddon.fit(); } catch (e) {}
      }
    });
    self._resizeObserver.observe(container);
  },

  /** Tear down the terminal, WebSocket, and backend PTY. */
  destroy() {
    const self = OpenCodeTUI;
    self._destroyed = true;
    if (self._resizeObserver) {
      self._resizeObserver.disconnect();
      self._resizeObserver = null;
    }
    if (self._ws) {
      self._ws.close();
      self._ws = null;
    }
    if (self._term) {
      self._term.dispose();
      self._term = null;
    }
    self._fitAddon = null;
    self._webglAddon = null;
    if (self._terminalId) {
      fetch('/api/terminal/' + self._terminalId, { method: 'DELETE' }).catch(() => {});
      self._terminalId = null;
    }
  },

  /** Destroy and re-open with the same options. */
  reconnect() {
    const self = OpenCodeTUI;
    const opts = self._currentOpts;
    self.destroy();
    const el = document.getElementById('page-content');
    if (!el) return;
    // Re-render the appropriate page which will call open() again
    if (state.page === 'chat') {
      renderChat(el);
    } else if (state.page === 'tui') {
      renderTUI(el);
    }
  },

  /** True if a terminal is currently running. */
  isActive() {
    return OpenCodeTUI._terminalId !== null && !OpenCodeTUI._destroyed;
  },

  /** Show the reconnect overlay. */
  _showOverlay(message) {
    const overlay = document.getElementById('terminal-overlay');
    const msgEl = document.getElementById('terminal-overlay-msg');
    const actionBtn = document.getElementById('terminal-overlay-action');
    if (!overlay) return;
    overlay.style.display = 'flex';
    if (msgEl) msgEl.textContent = message || '';
    if (actionBtn) {
      actionBtn.style.display = 'inline-flex';
      actionBtn.textContent = 'Reconnect';
      actionBtn.onclick = () => OpenCodeTUI.reconnect();
    }
  },

  /** Hide the overlay. */
  _hideOverlay() {
    const overlay = document.getElementById('terminal-overlay');
    if (overlay) overlay.style.display = 'none';
  },
};

/* ========================================================================
   Init
   ======================================================================== */
async function init() {
  showLoading(true);
  await Promise.all([fetchServers(), fetchSessions(), fetchEnvironments()]);
  showLoading(false);
  render();

  // Auto-refresh every 10s for live views (skip terminal pages)
  setInterval(async () => {
    if (['dashboard', 'servers', 'sessions'].includes(state.page)) {
      await Promise.all([fetchServers(), fetchSessions()]);
      if (['dashboard', 'servers', 'sessions'].includes(state.page)) {
        render();
      }
    }
  }, 10000);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'r') {
    e.preventDefault();
    refreshAll();
  }
});

// Network status → terminal overlay
window.addEventListener('offline', () => {
  if (['chat', 'tui'].includes(state.page)) OpenCodeTUI._showOverlay('Network connection lost.');
});
window.addEventListener('online', () => {
  if (['chat', 'tui'].includes(state.page)) OpenCodeTUI._hideOverlay();
});

init();
</script>
